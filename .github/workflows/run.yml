name: AI Shorts Bot

on:
  workflow_dispatch:       # manual trigger
  schedule:                # or run on a schedule
    - cron: '0 */6 * * *'  # every 6 hours (UTC)

env:
  # Force Node.js 24 (avoid Node 20 deprecation warnings)【26†L47-L55】
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ai-upload:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Python 3.11
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install moviepy[optional] requests edge-tts google-api-python-client oauth2client

      # 4. Run bot script
      - name: Run AI Bot
        run: python main.py

      # 5. Verify outputs (for debugging)
      - name: List Outputs
        run: ls -R outputs/

      # 6. Upload output as artifact (optional)
      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: ai-output
          path: outputs/
